---
version: 0.1
runson: linux

autosplit: true
concurrency: 2

runtime:
  language: java
  version: 11

cacheKey: '{{ checksum "pom.xml" }}'
cacheDirectories:
  - .m2

pre:
  - mvn -Dmaven.repo.local=./.m2 dependency:resolve

testDiscovery:
  type: raw
  mode: static
  command: echo "xml/single.xml"

testRunnerCommand: mvn test -Dplatname=linux-Dmaven.repo.local=./.m2 -Dsuite=single.xml

retryOnFailure: true
maxRetries: 3

jobLabel: [selenium-testng, linux, v1, autosplit]
